name: Build Student Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "app/student/**"
      - ".github/workflows/student-android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor deps
        run: npm install

      - name: Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Copy APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/GPT-Hubli-Student-debug.apk
          ls -lh dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: student-apk
          path: mobile/dist/GPT-Hubli-Student-debug.apk
          if-no-files-found: error
